<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulprozesse</title>
<link rel="stylesheet" href="css/style.css?v=202606261057">
</head>
<body>

<!-- App-Shell: sticky Header mit Navigation -->
<div id="app-shell">
  <div class="shell-brand">
    <div class="brand-left">
      <img id="shell-logo" src="/api/einstellungen/logo" alt="Schullogo"
           style="display:none;height:28px;width:auto;margin-right:10px;vertical-align:middle;"
           onerror="this.style.display='none'">
      <span class="brand-text" id="brand-text">Friedrich-Rückert-Gymnasium · <strong>Schulprozesse</strong></span>
    </div>
    <div id="shell-user"></div>
  </div>
  <nav class="shell-nav" id="shell-nav">
    <!-- wird von app.js befüllt -->
  </nav>
</div>

<!-- Prozess-Tabs (unter dem Header, nur wenn eingeloggt) -->
<div id="prozess-leiste" style="display:none;" class="prozess-leiste"></div>

<!-- Hauptinhalt -->
<main id="app">
  <p style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px;">Lädt…</p>
</main>

<footer>
  <span id="wer-bin-ich"></span>
</footer>

<script src="js/app.js?v=202606261057"></script>
</body>
</html>
